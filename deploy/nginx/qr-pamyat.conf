# Пример конфигурации nginx на VPS (продакшен)
# SSL — certbot / Let's Encrypt

upstream api_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name qr-pamyat.ru www.qr-pamyat.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name qr-pamyat.ru www.qr-pamyat.ru;

    # ssl_certificate     /etc/letsencrypt/live/qr-pamyat.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/qr-pamyat.ru/privkey.pem;

    root /var/www/qr-pamyat/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    # API
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Короткий редирект QR (важно для сканов)
    location /r/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
