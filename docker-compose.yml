# Локальная разработка. Продакшен — deploy/docker-compose.prod.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: qr_pamyat_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qr_pamyat}
      POSTGRES_USER: ${POSTGRES_USER:-qr_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qr_app_dev_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Схему БД применяйте вручную: psql ... -f db/scripts/00_run_all.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qr_app} -d ${POSTGRES_DB:-qr_pamyat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qr_pamyat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: qr_pamyat_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
