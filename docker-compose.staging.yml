# Стейджинг на VPS (Германия): HTTP по IP.
# Запуск из корня репозитория (/opt/site_qr):
#   docker compose -f docker-compose.staging.yml up -d --build
#
# .env читается из корня проекта автоматически.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qr_pamyat}
      POSTGRES_USER: ${POSTGRES_USER:-qr_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./db/scripts/00_full_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-qr_app} -d ${POSTGRES_DB:-qr_pamyat}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [site_qr]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qr_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qr_pamyat}
      MEDIA_STORAGE_ROOT: /data/uploads
    volumes:
      - ./uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks: [site_qr]

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.staging-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks: [site_qr]

networks:
  site_qr:
    driver: bridge

volumes:
  postgres_staging_data:
